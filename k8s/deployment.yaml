# Intentionally weak deployment for policy enforcement demo
# Issues: latest image, no resources, no securityContext, minimal labels
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: demo-app
  labels:
    app: demo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
        # Missing: version, git-sha, traceability metadata
    spec:
      # No securityContext
      containers:
        - name: app
          # Uses :latest - policy violation
          image: registry.example.com/demo-gitlab-argo-insecure-app:latest
          ports:
            - containerPort: 8080
          # No resources.requests
          # No resources.limits
          # No livenessProbe / readinessProbe
          env:
            - name: FLASK_ENV
              value: "production"
