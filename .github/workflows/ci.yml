# DevSecOps + GitOps Control Flow
# Demonstrates: validate → policy review → remediation → promotion gate → artifact handoff
# Policy verdict blocks or allows promotion to GitOps platform.

name: DevSecOps Pipeline

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

env:
  AGENT_REPO_URL: https://github.com/LongTheta/ai-devsecops-policy-enforcement-agent.git
  ARTIFACT_DIR: artifacts

permissions:
  contents: read
  pull-requests: read

jobs:
  # ---------------------------------------------------------------------------
  # 1. Validate — lightweight sanity checks
  # ---------------------------------------------------------------------------
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate YAML syntax
        run: |
          pip install PyYAML -q
          echo "Validating YAML files..."
          for f in .github/workflows/ci.yml argo/application.yaml k8s/deployment.yaml k8s/service.yaml k8s/namespace.yaml; do
            if [ -f "$f" ]; then
              python3 -c "import yaml; yaml.safe_load(open('$f'))" && echo "  ✓ $f"
            fi
          done

      - name: Check required files exist
        run: |
          for f in .github/workflows/ci.yml argo/application.yaml k8s/deployment.yaml Dockerfile; do
            [ -f "$f" ] || { echo "Missing: $f"; exit 1; }
          done
          echo "All required files present."

  # ---------------------------------------------------------------------------
  # 2. Review — run policy enforcement agent
  # ---------------------------------------------------------------------------
  review:
    name: Policy Review
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      verdict: ${{ steps.verdict.outputs.verdict }}
      risk_level: ${{ steps.verdict.outputs.risk_level }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Clone policy enforcement agent
        run: |
          git clone --depth 1 "${{ env.AGENT_REPO_URL }}" agent-repo
          pip install -e ./agent-repo

      - name: Create artifact directory
        run: mkdir -p ${{ env.ARTIFACT_DIR }}

      - name: Run policy review
        id: review
        run: |
          python -m ai_devsecops_agent.cli review-all \
            --platform github \
            --pipeline .github/workflows/ci.yml \
            --gitops argo/application.yaml \
            --manifests k8s/deployment.yaml \
            --policy agent-repo/policies/fedramp-moderate.yaml \
            --include-comments \
            --include-remediations \
            --include-risk-score \
            --artifact-dir ${{ env.ARTIFACT_DIR }}/ \
            || true
          # Agent may exit non-zero on FAIL verdict; we capture artifacts either way

      - name: Debug — list artifacts produced
        run: |
          echo "Artifacts in ${{ env.ARTIFACT_DIR }}/:"
          ls -la ${{ env.ARTIFACT_DIR }}/ 2>/dev/null || echo "(empty or missing)"
          for f in policy-summary.json review-result.json; do
            if [ -f "${{ env.ARTIFACT_DIR }}/$f" ]; then
              echo "--- $f (first 20 lines) ---"
              head -20 "${{ env.ARTIFACT_DIR }}/$f"
            fi
          done

      - name: Extract verdict and risk
        id: verdict
        run: |
          VERDICT="UNKNOWN"
          RISK="unknown"
          AD="${{ env.ARTIFACT_DIR }}"
          # Try policy-summary.json
          if [ -f "$AD/policy-summary.json" ]; then
            V=$(jq -r '.verdict // .policy_verdict // .policyVerdict // .result.verdict // "UNKNOWN"' "$AD/policy-summary.json" 2>/dev/null)
            [ "$V" != "null" ] && [ -n "$V" ] && VERDICT="$V"
            R=$(jq -r '.risk_level // .riskLevel // .risk // "unknown"' "$AD/policy-summary.json" 2>/dev/null)
            [ "$R" != "null" ] && [ -n "$R" ] && RISK="$R"
            # Derive risk from severity_counts if risk_level missing
            if [ "$RISK" = "unknown" ] || [ "$RISK" = "null" ]; then
              CRIT=$(jq -r '.severity_counts.critical // 0' "$AD/policy-summary.json" 2>/dev/null || echo 0)
              HIGH=$(jq -r '.severity_counts.high // 0' "$AD/policy-summary.json" 2>/dev/null || echo 0)
              [ "${CRIT:-0}" -gt 0 ] && RISK="critical"
              [ "${HIGH:-0}" -gt 0 ] && [ "$RISK" = "unknown" ] && RISK="high"
            fi
          fi
          # Try review-result.json (overrides)
          if [ -f "$AD/review-result.json" ]; then
            V=$(jq -r '.verdict // .policy_verdict // .policyVerdict // .result.verdict // "'"$VERDICT"'"' "$AD/review-result.json" 2>/dev/null)
            [ "$V" != "null" ] && [ -n "$V" ] && VERDICT="$V"
            R=$(jq -r '.risk_level // .riskLevel // .risk // "'"$RISK"'"' "$AD/review-result.json" 2>/dev/null)
            [ "$R" != "null" ] && [ -n "$R" ] && RISK="$R"
          fi
          # Normalize verdict (agent may use lowercase)
          case "$VERDICT" in
            fail|FAIL) VERDICT="FAIL" ;;
            pass|PASS) VERDICT="PASS" ;;
            pass_with_warnings|PASS_WITH_WARNINGS) VERDICT="PASS_WITH_WARNINGS" ;;
          esac
          # Ensure policy-summary exists for downstream jobs
          if [ ! -f "$AD/policy-summary.json" ]; then
            jq -n --arg v "$VERDICT" --arg r "$RISK" '{verdict: $v, risk_level: $r}' > "$AD/policy-summary.json"
          fi
          echo "verdict=$VERDICT" >> $GITHUB_OUTPUT
          echo "risk_level=$RISK" >> $GITHUB_OUTPUT
          echo "Policy Verdict: $VERDICT"
          echo "Risk Level: $RISK"

      - name: Print summary
        run: |
          echo "--- Policy Review Summary ---"
          [ -f ${{ env.ARTIFACT_DIR }}/report.md ] && head -80 ${{ env.ARTIFACT_DIR }}/report.md || echo "No report.md"
          echo ""
          echo "--- Verdict ---"
          echo "Policy Verdict: ${{ steps.verdict.outputs.verdict }}"
          echo "Risk Score: ${{ steps.verdict.outputs.risk_level }}"

      - name: Upload review artifacts
        uses: actions/upload-artifact@v4
        with:
          name: policy-review-artifacts
          path: ${{ env.ARTIFACT_DIR }}/
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 3. Remediation — auto-fix suggest when verdict is FAIL
  # ---------------------------------------------------------------------------
  remediation:
    name: Auto-Fix Suggest
    runs-on: ubuntu-latest
    needs: review
    if: always() && needs.review.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download review artifacts
        uses: actions/download-artifact@v4
        with:
          name: policy-review-artifacts

      - name: Set up Python and agent
        run: |
          pip install PyYAML
          git clone --depth 1 "${{ env.AGENT_REPO_URL }}" agent-repo
          pip install -e ./agent-repo

      - name: Run auto-fix suggest (when verdict is FAIL)
        id: autofix
        run: |
          if [ -f "artifacts/review-result.json" ]; then
            VERDICT=$(jq -r '.verdict // .policy_verdict // .policyVerdict // "UNKNOWN"' artifacts/review-result.json)
            if [ "$VERDICT" = "FAIL" ] || [ "$VERDICT" = "fail" ]; then
              echo "Verdict is FAIL — running auto-fix suggest..."
              mkdir -p artifacts/fixes
              python -m ai_devsecops_agent.cli auto-fix \
                --input artifacts/review-result.json \
                --mode suggest 2>&1 | tee artifacts/fixes/suggestions.txt || true
              if [ -d "artifacts/fixes" ] && [ -n "$(ls -A artifacts/fixes 2>/dev/null)" ]; then
                echo "Fix suggestions generated."
              fi
            else
              echo "Verdict is $VERDICT — skipping auto-fix suggest."
            fi
          else
            echo "No review-result.json — skipping auto-fix."
          fi

      - name: Upload fix suggestions
        uses: actions/upload-artifact@v4
        with:
          name: auto-fix-suggestions
          path: artifacts/fixes/
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  # 4. Promotion Check — gate: pass or block based on verdict
  # ---------------------------------------------------------------------------
  promotion_check:
    name: Promotion Check
    runs-on: ubuntu-latest
    needs: review
    steps:
      - name: Download review artifacts
        uses: actions/download-artifact@v4
        with:
          name: policy-review-artifacts

      - name: Evaluate promotion eligibility
        id: gate
        run: |
          VERDICT="UNKNOWN"
          RISK="unknown"
          if [ -f "artifacts/policy-summary.json" ]; then
            V=$(jq -r '.verdict // .policy_verdict // .policyVerdict // .result.verdict // "UNKNOWN"' artifacts/policy-summary.json 2>/dev/null)
            [ "$V" != "null" ] && [ -n "$V" ] && VERDICT="$V"
            R=$(jq -r '.risk_level // .riskLevel // .risk // "unknown"' artifacts/policy-summary.json 2>/dev/null)
            [ "$R" != "null" ] && [ -n "$R" ] && RISK="$R"
            if [ "$RISK" = "unknown" ] || [ "$RISK" = "null" ]; then
              CRIT=$(jq -r '.severity_counts.critical // 0' artifacts/policy-summary.json 2>/dev/null || echo 0)
              HIGH=$(jq -r '.severity_counts.high // 0' artifacts/policy-summary.json 2>/dev/null || echo 0)
              [ "${CRIT:-0}" -gt 0 ] && RISK="critical"
              [ "${HIGH:-0}" -gt 0 ] && [ "$RISK" = "unknown" ] && RISK="high"
            fi
          fi
          if [ -f "artifacts/review-result.json" ]; then
            V=$(jq -r '.verdict // .policy_verdict // .policyVerdict // .result.verdict // "'"$VERDICT"'"' artifacts/review-result.json 2>/dev/null)
            [ "$V" != "null" ] && [ -n "$V" ] && VERDICT="$V"
            R=$(jq -r '.risk_level // .riskLevel // .risk // "'"$RISK"'"' artifacts/review-result.json 2>/dev/null)
            [ "$R" != "null" ] && [ -n "$R" ] && RISK="$R"
          fi
          case "$VERDICT" in
            fail|FAIL) VERDICT="FAIL" ;;
            pass|PASS) VERDICT="PASS" ;;
            pass_with_warnings|PASS_WITH_WARNINGS) VERDICT="PASS_WITH_WARNINGS" ;;
          esac

          APPROVED=false
          if [ "$VERDICT" = "PASS" ] || [ "$VERDICT" = "pass" ]; then
            APPROVED=true
          elif [ "$VERDICT" = "PASS_WITH_WARNINGS" ] || [ "$VERDICT" = "pass_with_warnings" ]; then
            # Allow only for dev; block for prod
            APPROVED=true
            echo "PASS_WITH_WARNINGS: approved for dev only"
          fi

          if [ "$RISK" = "critical" ] || [ "$RISK" = "high" ]; then
            APPROVED=false
          fi

          echo "verdict=$VERDICT" >> $GITHUB_OUTPUT
          echo "risk_level=$RISK" >> $GITHUB_OUTPUT
          echo "approved=$APPROVED" >> $GITHUB_OUTPUT

          echo ""
          echo "=========================================="
          echo "  Policy Verdict: $VERDICT"
          echo "  Risk Score: $RISK"
          echo "  Promotion Eligible: $([ "$APPROVED" = "true" ] && echo "Yes" || echo "No")"
          echo "=========================================="
          echo ""

          if [ "$APPROVED" = "false" ]; then
            echo "Promotion BLOCKED. Fix policy violations before promoting to GitOps platform."
            exit 1
          fi

          echo "Promotion ALLOWED. Artifacts ready for GitOps platform handoff."

  # ---------------------------------------------------------------------------
  # 5. Package Artifacts — promotion request for GitOps platform
  # ---------------------------------------------------------------------------
  package_artifacts:
    name: Package Promotion Artifacts
    runs-on: ubuntu-latest
    needs: review
    if: always() && needs.review.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download review artifacts
        uses: actions/download-artifact@v4
        with:
          name: policy-review-artifacts

      - name: Generate promotion request
        id: promotion
        run: |
          VERDICT="UNKNOWN"
          RISK="unknown"
          if [ -f "artifacts/policy-summary.json" ]; then
            V=$(jq -r '.verdict // .policy_verdict // .policyVerdict // .result.verdict // "UNKNOWN"' artifacts/policy-summary.json 2>/dev/null)
            [ "$V" != "null" ] && [ -n "$V" ] && VERDICT="$V"
            R=$(jq -r '.risk_level // .riskLevel // .risk // "unknown"' artifacts/policy-summary.json 2>/dev/null)
            [ "$R" != "null" ] && [ -n "$R" ] && RISK="$R"
            if [ "$RISK" = "unknown" ] || [ "$RISK" = "null" ]; then
              CRIT=$(jq -r '.severity_counts.critical // 0' artifacts/policy-summary.json 2>/dev/null || echo 0)
              HIGH=$(jq -r '.severity_counts.high // 0' artifacts/policy-summary.json 2>/dev/null || echo 0)
              [ "${CRIT:-0}" -gt 0 ] && RISK="critical"
              [ "${HIGH:-0}" -gt 0 ] && [ "$RISK" = "unknown" ] && RISK="high"
            fi
          fi
          if [ -f "artifacts/review-result.json" ]; then
            V=$(jq -r '.verdict // .policy_verdict // .policyVerdict // .result.verdict // "'"$VERDICT"'"' artifacts/review-result.json 2>/dev/null)
            [ "$V" != "null" ] && [ -n "$V" ] && VERDICT="$V"
            R=$(jq -r '.risk_level // .riskLevel // .risk // "'"$RISK"'"' artifacts/review-result.json 2>/dev/null)
            [ "$R" != "null" ] && [ -n "$R" ] && RISK="$R"
          fi
          case "$VERDICT" in
            fail|FAIL) VERDICT="FAIL" ;;
            pass|PASS) VERDICT="PASS" ;;
            pass_with_warnings|PASS_WITH_WARNINGS) VERDICT="PASS_WITH_WARNINGS" ;;
          esac

          APPROVED=false
          if [ "$VERDICT" = "PASS" ] || [ "$VERDICT" = "pass" ]; then
            APPROVED=true
          elif [ "$VERDICT" = "PASS_WITH_WARNINGS" ] || [ "$VERDICT" = "pass_with_warnings" ]; then
            APPROVED=true
          fi
          if [ "$RISK" = "critical" ] || [ "$RISK" = "high" ]; then
            APPROVED=false
          fi

          CANDIDATE_ENV="dev"
          if [ "$APPROVED" = "true" ] && [ "$RISK" != "high" ] && [ "$RISK" != "critical" ]; then
            CANDIDATE_ENV="staging"
          fi

          PR_NUM=""
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            PR_NUM="${{ github.event.pull_request.number }}"
          fi

          mkdir -p artifacts
          jq -n \
            --arg app "demo-app" \
            --arg sha "${{ github.sha }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg pr "$PR_NUM" \
            --arg verdict "$VERDICT" \
            --arg risk "$RISK" \
            --argjson approved $([ "$APPROVED" = "true" ] && echo "true" || echo "false") \
            --arg env "$CANDIDATE_ENV" \
            '{
              app_name: $app,
              commit_sha: $sha,
              branch: $branch,
              pr_number: (if $pr != "" then ($pr | tonumber) else null end),
              review_verdict: $verdict,
              risk_level: $risk,
              candidate_environment: $env,
              approved_for_promotion: $approved,
              generated_at: (now | todate)
            }' > artifacts/promotion-request.json

          echo "Generated artifacts/promotion-request.json"
          cat artifacts/promotion-request.json

      - name: Upload promotion artifacts
        uses: actions/upload-artifact@v4
        with:
          name: promotion-request
          path: artifacts/promotion-request.json
